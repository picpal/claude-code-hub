name: Deploy Jekyll site to Pages

# 배포 트리거:
# - push to main: 직접 코드 변경 시 배포
# - workflow_dispatch: 수동 배포 또는 Sync Patch Notes에서 명시적 호출
on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  notify:
    if: always()
    needs: [build, deploy]
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack
        if: env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ "${{ needs.deploy.result }}" = "success" ]; then
            EMOJI="✅"
            STATUS="배포 성공"
          else
            EMOJI="❌"
            STATUS="배포 실패"
          fi

          curl -sf -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-type: application/json' \
            -d "$(jq -n \
              --arg emoji "$EMOJI" \
              --arg status "$STATUS" \
              --arg workflow "Deploy Jekyll Pages" \
              --arg trigger "${{ github.event_name }}" \
              --arg url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              --arg page "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/" \
              '{text: "\($emoji) \($workflow) \($status)\n트리거: \($trigger)\n사이트: \($page)\n로그: \($url)"}')" || echo "Slack notification failed"
