name: Claude Briefing

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

concurrency:
  group: briefing
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  briefing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Restore briefing state
        uses: actions/cache/restore@v4
        with:
          path: .briefing-state
          key: briefing-state-${{ github.run_id }}
          restore-keys: briefing-state-

      - name: Run briefing
        run: bash scripts/claude-briefing.sh
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Compute state hash
        id: state-hash
        if: always()
        run: |
          if [ -f .briefing-state/seen-urls.txt ]; then
            HASH=$(sha256sum .briefing-state/seen-urls.txt | cut -d' ' -f1 | head -c 16)
          else
            HASH="empty"
          fi
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"

      - name: Save briefing state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .briefing-state
          key: briefing-state-${{ steps.state-hash.outputs.hash }}
