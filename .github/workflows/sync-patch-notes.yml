name: Sync Patch Notes

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      has_new: ${{ steps.detect.outputs.has_new }}
    steps:
      - uses: actions/checkout@v4

      - name: Check for new releases
        id: detect
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASES=$(curl -sf --connect-timeout 10 -m 15 \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/anthropics/claude-code/releases?per_page=10") || { echo "has_new=false" >> "$GITHUB_OUTPUT"; exit 0; }

          HAS_NEW=false
          echo "$RELEASES" | jq -c '.[]' | while read -r release; do
            TAG=$(echo "$release" | jq -r '.tag_name')
            DATE=$(echo "$release" | jq -r '.published_at' | cut -dT -f1)
            BODY=$(echo "$release" | jq -r '.body // ""')
            FILENAME="${DATE}-${TAG}.md"

            if [ ! -f "pages/patch-notes/$FILENAME" ] && [ -n "$BODY" ] && [ "$BODY" != "null" ]; then
              echo "New release found: $TAG ($DATE)"
              echo "has_new=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done

          echo "No new releases"
          echo "has_new=false" >> "$GITHUB_OUTPUT"

  sync:
    needs: check
    if: needs.check.outputs.has_new == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      sync_log: ${{ steps.sync_log.outputs.log }}
    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Sync patch notes
        id: sync_log
        run: |
          OUTPUT=$(bash scripts/sync-patch-notes.sh 2>&1)
          echo "$OUTPUT"
          echo "log<<EOF" >> "$GITHUB_OUTPUT"
          echo "$OUTPUT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
        env:
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pages/patch-notes/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: sync patch notes from Claude Code releases"
            git push
          fi

  notify:
    if: always() && (needs.check.outputs.has_new == 'true' || github.event_name == 'workflow_dispatch')
    needs: [check, sync]
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack
        if: env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SYNC_LOG: ${{ needs.sync.outputs.sync_log }}
        run: |
          if [ "${{ needs.sync.result }}" = "success" ]; then
            EMOJI="✅"
            STATUS="성공"
          else
            EMOJI="❌"
            STATUS="실패"
          fi

          # 로그 텍스트 (최대 500자로 제한)
          LOG_TEXT="${SYNC_LOG:0:500}"
          [ ${#SYNC_LOG} -gt 500 ] && LOG_TEXT="${LOG_TEXT}..."

          curl -sf -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-type: application/json' \
            -d "$(jq -n \
              --arg emoji "$EMOJI" \
              --arg status "$STATUS" \
              --arg workflow "Sync Patch Notes" \
              --arg trigger "${{ github.event_name }}" \
              --arg url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              --arg log "$LOG_TEXT" \
              '{text: "\($emoji) \($workflow) \($status)\n트리거: \($trigger)\n로그: \($url)\n```\n\($log)\n```"}')" || echo "Slack notification failed"
