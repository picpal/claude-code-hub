name: Sync Patch Notes

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      has_new: ${{ steps.detect.outputs.has_new }}
    steps:
      - uses: actions/checkout@v4

      - name: Check for new releases
        id: detect
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASES=$(curl -sf --connect-timeout 10 -m 15 \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/anthropics/claude-code/releases?per_page=10") || { echo "has_new=false" >> "$GITHUB_OUTPUT"; exit 0; }

          HAS_NEW=false
          while read -r release; do
            TAG=$(echo "$release" | jq -r '.tag_name')
            DATE=$(echo "$release" | jq -r '.published_at' | cut -dT -f1)
            BODY=$(echo "$release" | jq -r '.body // ""')
            FILENAME="${DATE}-${TAG}.md"

            if [ ! -f "pages/patch-notes/$FILENAME" ] && [ -n "$BODY" ] && [ "$BODY" != "null" ]; then
              echo "New release found: $TAG ($DATE)"
              HAS_NEW=true
              break
            fi
          done < <(echo "$RELEASES" | jq -c '.[]')

          echo "has_new=$HAS_NEW" >> "$GITHUB_OUTPUT"
          if [ "$HAS_NEW" = "false" ]; then echo "No new releases"; fi

  sync:
    needs: check
    if: needs.check.outputs.has_new == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      sync_log: ${{ steps.sync_log.outputs.log }}
    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Sync patch notes
        id: sync_log
        run: |
          OUTPUT=$(bash scripts/sync-patch-notes.sh 2>&1)
          echo "$OUTPUT"
          echo "log<<EOF" >> "$GITHUB_OUTPUT"
          echo "$OUTPUT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push
        id: push_check
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pages/patch-notes/
          if git diff --staged --quiet; then
            echo "No changes to commit"
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: sync patch notes from Claude Code releases"
            git push
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger deploy
        if: steps.push_check.outputs.pushed == 'true'
        run: gh workflow run jekyll.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger briefing
        if: steps.push_check.outputs.pushed == 'true'
        run: gh workflow run claude-briefing.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
